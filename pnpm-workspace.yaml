packages:
  - "apps/*"
  - "packages/*"

# Only packages listed here may run install scripts (pnpm supply-chain default).
strictDepBuilds: true
allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true
  msw: false

# better-auth ships unused DB adapters (incl. Prisma); we use Drizzle + Neon only.
autoInstallPeers: false
ignoredOptionalDependencies:
  - prisma
  - "@prisma/client"

# Central dependency versions — reference in package.json as "catalog:" (pnpm catalog protocol).
# Bump versions here once; run `pnpm install` across the monorepo.
catalog:
  # Framework
  next: 16.2.6
  react: 19.2.6
  react-dom: 19.2.6

  # Language & tooling
  typescript: ^5
  esbuild: 0.28.0
  tsx: ^4.22.3
  turbo: ^2.9.16
  "@turbo/gen": ^2.9.15

  # Types
  "@types/node": ^24
  "@types/react": ^19
  "@types/react-dom": ^19
  "@types/mdx": ^2.0.13

  # Validation & ORM
  zod: ^4.4.3
  drizzle-orm: ^0.45.2
  drizzle-kit: ^0.31.9
  "@neondatabase/serverless": ^1.1.0

  # Auth
  better-auth: ^1.6.11
  "@better-auth/api-key": 1.6.11
  "@better-auth/agent-auth": 0.5.1

  # Lint & format
  eslint: ^9
  "@eslint/js": ^9
  "@next/eslint-plugin-next": ^16.2.6
  typescript-eslint: ^8.60.0
  "@typescript-eslint/eslint-plugin": ^8.60.0
  "@typescript-eslint/parser": ^8.60.0
  eslint-config-prettier: ^10.1.8
  eslint-plugin-only-warn: ^1.2.1
  eslint-plugin-react: ^7.37.5
  eslint-plugin-react-hooks: ^7.1.1
  eslint-plugin-turbo: ^2.9.15
  globals: ^17.6.0
  prettier: ^3.8.3
  prettier-plugin-tailwindcss: ^0.8.0

  # Tailwind & CSS
  tailwindcss: ^4.3.0
  "@tailwindcss/postcss": ^4.3.0
  postcss: ^8.5.15
  tailwind-merge: ^3.6.0
  tw-animate-css: ^1.4.0

  # UI
  "@phosphor-icons/react": ^2.1.10
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  cmdk: ^1.1.1
  lucide-react: ^1.17.0
  next-themes: ^0.4.6
  radix-ui: ^1.4.3
  shadcn: ^4.8.3
  shiki: ^4.1.0
  sonner: ^2.0.7

  # Next.js utilities
  server-only: ^0.0.1

  # Payments
  stripe: ^22.2.0
  "@stripe/react-stripe-js": ^6.4.0
  "@stripe/stripe-js": ^9.7.0

  # Email
  resend: ^6.12.4
  react-email: ^6.5.0

  # Platform & storage
  "@upstash/redis": ^1.34.7
  "@vercel/blob": ^2.4.0
  "@vercel/sdk": ^1.21.8
  aws4fetch: ^1.0.20
  bcrypt-ts: ^5.0.3

  # API client & MCP
  openapi-fetch: ^0.17.0
  openapi-typescript: ^7.13.0
  mcp-handler: ^1.1.0
  "@modelcontextprotocol/sdk": 1.26.0

  # Docs (Fumadocs)
  fumadocs-core: 16.9.3
  fumadocs-mdx: 15.0.10
  fumadocs-openapi: ^10.9.1
  fumadocs-ui: 16.9.3

  # Test
  vitest: ^4.0.0

# Single versions across the tree (direct + transitive).
overrides:
  react: "catalog:"
  react-dom: "catalog:"
  esbuild: "catalog:"
